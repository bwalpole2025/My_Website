<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stability analysis and solitary waves on Plateau border flows</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #f5f7ef;
        --muted: #a5ac9d;
        --line: rgba(245, 247, 239, 0.16);
        --green: #8ef0b7;
        --bg: #050705;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--bg);
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        padding: 1rem clamp(1rem, 4vw, 2rem);
        border-bottom: 1px solid var(--line);
        background: rgba(5, 7, 5, 0.88);
      }

      h1 {
        margin: 0;
        font-size: 1rem;
        line-height: 1.35;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      a {
        color: var(--green);
        font-weight: 750;
        text-decoration: none;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.55rem;
        padding: 0 0.9rem;
        border: 1px solid rgba(142, 240, 183, 0.32);
        border-radius: 8px;
        background: rgba(142, 240, 183, 0.08);
      }

      main {
        height: calc(100svh - 4.6rem);
        min-height: 32rem;
      }

      object,
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #111;
      }

      .fallback {
        max-width: 44rem;
        margin: 0 auto;
        padding: 3rem 1.25rem;
        color: var(--muted);
        line-height: 1.65;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Stability analysis and solitary waves on Plateau border flows</h1>
      <nav aria-label="PDF actions">
        <a class="button" href="./index.html#publications">Back</a>
        <a
          class="button"
          href="./assets/stability-analysis-and-solitary-waves-on-plateau-border-flows.pdf"
        >
          Open PDF
        </a>
      </nav>
    </header>
    <main>
      <object
        data="./assets/stability-analysis-and-solitary-waves-on-plateau-border-flows.pdf"
        type="application/pdf"
      >
        <div class="fallback">
          <p>
            The PDF viewer did not load in this browser. Use the Open PDF button above
            to open the attached document directly.
          </p>
        </div>
      </object>
    </main>
  </body>
</html>
