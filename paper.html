        background:

        position: sticky;
        top: 0;

        display: flex;

        justify-content: space-between;

      }

        max-width: 48rem;
        margin: 0;
        font-size: 1rem;
        line-height: 1.35;
      }

      nav {
        display: flex;
        flex-wrap: wrap;
        gap: 0.65rem;
      }

      a {
        color: var(--green);
        font-weight: 750;
        text-decoration: none;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 2.55rem;
        padding: 0 0.9rem;
        border: 1px solid rgba(142, 240, 183, 0.32);
        border-radius: 8px;
        background: rgba(142, 240, 183, 0.08);
        white-space: nowrap;
      }

      main {
        display: grid;
        gap: 1.4rem;
        max-width: 62rem;
        margin: 0 auto;
        padding: clamp(1rem, 4vw, 2.4rem);
      }

      .paper-note {
        margin: 0 0 0.4rem;
        color: var(--muted);
        line-height: 1.6;
      }

      .page {
        margin: 0;
      }

      .page img {
        display: block;
        width: 100%;
        height: auto;
        border: 1px solid rgba(245, 247, 239, 0.16);
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.32);
      }

      .page figcaption {
        padding: 0.55rem 0 0;
        color: var(--muted);
        font-size: 0.78rem;
        text-align: right;
      }

      @media (max-width: 680px) {
        header {
          align-items: flex-start;
          flex-direction: column;
        }
      }
